<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智盾 - 展示用监控看板</title>
  <style>
    :root {
      --bg-1: #e8eef8;
      --bg-2: #cfdcf2;
      --panel: rgba(255, 255, 255, 0.55);
      --panel-strong: rgba(255, 255, 255, 0.78);
      --line: rgba(73, 109, 168, 0.18);
      --text: #16325c;
      --muted: #60779b;
      --green: #67d7ae;
      --red: #ff8b97;
      --violet: #a5a2ff;
      --yellow: #f8ce6a;
      --shadow: 0 24px 80px rgba(43, 78, 140, 0.16);
      --radius: 28px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(159, 208, 255, 0.65), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(246, 202, 255, 0.45), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(183, 226, 255, 0.45), transparent 30%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      padding: 28px;
    }

    .app {
      display: grid;
      grid-template-columns: 300px 1fr 300px;
      gap: 24px;
      min-height: calc(100vh - 56px);
    }

    .panel {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.6);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .sidebar {
      padding: 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 8px 8px 26px;
    }

    .brand img {
      width: 46px;
      height: 46px;
      border-radius: 14px;
      box-shadow: 0 10px 24px rgba(42, 72, 137, 0.18);
      background: rgba(255, 255, 255, 0.82);
      padding: 4px;
    }

    .brand h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: 0.08em;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 20px;
      border-radius: 20px;
      color: var(--muted);
      font-size: 18px;
      background: rgba(255, 255, 255, 0.22);
      border: 1px solid transparent;
    }

    .nav-item.active {
      color: var(--text);
      background: var(--panel-strong);
      border-color: rgba(136, 177, 255, 0.28);
    }

    .nav-icon {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      background: linear-gradient(135deg, #d4def3, #fdfdff);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.9);
    }

    .main {
      padding: 26px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
    }

    .hero h2 {
      margin: 0;
      font-size: 32px;
      font-weight: 700;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 15px;
    }

    .chip {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .map-card {
      padding: 24px;
    }

    .map-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .map-title h3,
    .chart-card h3,
    .alarm-card h3 {
      margin: 0;
      font-size: 18px;
    }

    .map-wrap {
      position: relative;
      height: 480px;
      overflow: hidden;
      border-radius: 24px;
      background: #eef3fb;
      border: 1px solid rgba(119, 150, 206, 0.16);
    }

    .map-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .device-dot {
      position: absolute;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      box-shadow: 0 0 0 10px rgba(255, 255, 255, 0.3);
    }

    .device-dot.green { background: var(--green); left: 19%; top: 22%; }
    .device-dot.red { background: var(--red); left: 58%; top: 28%; }
    .device-dot.violet { background: var(--violet); left: 71%; top: 40%; }

    .legend {
      display: flex;
      gap: 20px;
      align-items: center;
      padding-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .legend span::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }

    .legend .normal::before { background: var(--green); }
    .legend .alarm::before { background: var(--red); }
    .legend .offline::before { background: var(--violet); }

    .chart-card {
      padding: 24px;
      min-height: 240px;
    }

    .chart {
      margin-top: 18px;
      height: 150px;
      border-radius: 18px;
      background:
        linear-gradient(to top, rgba(255,255,255,0.85), rgba(255,255,255,0.35)),
        linear-gradient(rgba(110, 135, 185, 0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(110, 135, 185, 0.12) 1px, transparent 1px);
      background-size: auto, 100% 30px, 40px 100%;
      position: relative;
      overflow: hidden;
    }

    .line {
      position: absolute;
      inset: 0;
    }

    .line svg {
      width: 100%;
      height: 100%;
    }

    .rightbar {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .stat {
      padding: 24px 20px;
      text-align: center;
    }

    .stat .label {
      color: var(--muted);
      font-size: 16px;
      margin-bottom: 12px;
    }

    .stat .value {
      font-size: 56px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .stat.total .value { color: var(--violet); }
    .stat.online .value { color: var(--green); }
    .stat.alarm .value { color: var(--red); }

    .alarm-card {
      padding: 22px;
      flex: 1;
    }

    .alarm-shot {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 22px;
      margin: 16px 0;
      display: block;
    }

    .alarm-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(97, 122, 168, 0.12);
      font-size: 14px;
      color: var(--muted);
    }

    .alarm-item strong {
      color: var(--text);
      font-size: 15px;
      display: block;
      margin-bottom: 4px;
    }

    .alarm-badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 139, 151, 0.16);
      color: #d84864;
      font-size: 12px;
      font-weight: 700;
    }

    .footer-note {
      position: fixed;
      right: 20px;
      bottom: 18px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(83, 116, 180, 0.14);
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel sidebar">
      <div class="brand">
        <img src="vue-app/public/logo.png" alt="智盾">
        <h1>智盾</h1>
      </div>
      <div class="nav-item active"><span class="nav-icon"></span>仪表盘</div>
      <div class="nav-item"><span class="nav-icon"></span>设备列表</div>
      <div class="nav-item"><span class="nav-icon"></span>业务日志</div>
      <div class="nav-item"><span class="nav-icon"></span>报警历史</div>
      <div class="nav-item"><span class="nav-icon"></span>趋势分析</div>
    </aside>

    <main class="panel main">
      <div class="hero">
        <div>
          <h2>叉车作业人车互斥报警系统</h2>
          <p>展示用静态 HTML，看板样式保留，去掉后端依赖，适合演示、截图和答辩展示。</p>
        </div>
        <div class="chip">最近更新 00:04:06</div>
      </div>

      <section class="panel map-card">
        <div class="map-title">
          <h3>工厂平面图</h3>
          <span class="chip">设备状态可视化</span>
        </div>
        <div class="map-wrap">
          <img src="map.jpg" alt="工厂平面图">
          <span class="device-dot green" title="正常"></span>
          <span class="device-dot red" title="报警"></span>
          <span class="device-dot violet" title="离线"></span>
        </div>
        <div class="legend">
          <span class="normal">正常</span>
          <span class="alarm">报警</span>
          <span class="offline">离线</span>
        </div>
      </section>

      <section class="panel chart-card">
        <h3>报警次数趋势</h3>
        <div class="chart">
          <div class="line">
            <svg viewBox="0 0 900 220" preserveAspectRatio="none" aria-hidden="true">
              <path d="M0 168 C70 120, 90 150, 140 128 S240 30, 290 86 S390 190, 430 108 S540 66, 590 74 S700 204, 760 132 S840 90, 900 128"
                    fill="none" stroke="#918fff" stroke-width="5" stroke-linecap="round"/>
              <path d="M0 150 C58 168, 100 210, 150 112 S250 152, 320 90 S430 186, 500 110 S620 48, 690 128 S820 164, 900 102"
                    fill="none" stroke="#d7ef59" stroke-width="5" stroke-linecap="round"/>
            </svg>
          </div>
        </div>
      </section>
    </main>

    <aside class="rightbar">
      <section class="panel stat total">
        <div class="label">设备总数</div>
        <div class="value">3</div>
      </section>
      <section class="panel stat online">
        <div class="label">在线设备</div>
        <div class="value">2</div>
      </section>
      <section class="panel stat alarm">
        <div class="label">当前报警</div>
        <div class="value">2</div>
      </section>
      <section class="panel alarm-card">
        <h3>最近报警</h3>
        <img class="alarm-shot" src="images/alarms/FORK-003_20260408_003836.png" alt="报警图片">
        <div class="alarm-item">
          <div>
            <strong>FORK-003</strong>
            叉车靠近作业区，已触发预警
          </div>
          <span class="alarm-badge">报警</span>
        </div>
        <div class="alarm-item">
          <div>
            <strong>FORK-001</strong>
            设备在线，状态正常
          </div>
          <span class="alarm-badge" style="background: rgba(103, 215, 174, 0.18); color: #239b77;">正常</span>
        </div>
      </section>
    </aside>
  </div>

  <div class="footer-note">智盾 · 展示用静态 HTML</div>
</body>
</html>
