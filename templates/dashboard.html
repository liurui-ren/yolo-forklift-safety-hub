<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>叉车作业人车互斥报警系统</title>
  <script src="/static/echarts.min.js"></script>
  <script src="/static/socket.io.min.js"></script>
  <style>
    :root {
      --bg-primary: #f5f5f7;
      --bg-card: #ffffff;
      --text-primary: #1d1d1f;
      --text-secondary: #6e6e73;
      --border-color: #d2d2d7;
      --status-normal: #34c759;
      --status-alarm: #ff3b30;
      --status-offline: #8e8e93;
      --radius: 6px;
      --font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", Arial, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-family);
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-weight: 400;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .page-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-title h1 {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-title .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
    }

    .nav-bar {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      background: var(--bg-card);
      color: var(--text-primary);
      text-decoration: none;
      border-radius: var(--radius);
      border: 1px solid var(--border-color);
      font-size: 13px;
      font-weight: 400;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .nav-btn:hover {
      background: var(--bg-primary);
      border-color: var(--text-secondary);
    }

    .nav-btn svg {
      width: 14px;
      height: 14px;
    }

    /* 顶部KPI区域 / Top KPI row */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi-card {
      display: block;
      text-decoration: none;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 18px 20px;
      transition: border-color 0.2s ease, background-color 0.2s ease;
    }

    .kpi-card:hover {
      background: var(--bg-primary);
      border-color: var(--text-secondary);
    }

    .kpi-card.alarm {
      border-color: var(--status-alarm);
    }

    .kpi-title {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .kpi-value.online {
      color: var(--status-normal);
    }

    .kpi-value.alarm {
      color: var(--status-alarm);
    }

    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      padding: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-color);
    }

    .card-title-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-header svg {
      width: 18px;
      height: 18px;
      color: var(--text-secondary);
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .map-meta {
      font-size: 12px;
      color: var(--text-secondary);
    }

    #map-chart {
      width: 100%;
      height: 560px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
    }

    @media (max-width: 900px) {
      .kpi-row {
        grid-template-columns: 1fr;
      }

      #map-chart {
        height: 430px;
      }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="header">
      <div class="header-left">
        <div class="header-title">
          <h1>叉车作业人车互斥报警系统</h1>
          <div class="subtitle">实时总览</div>
        </div>
      </div>
      <div class="nav-bar">
        <a href="/devices" class="nav-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 17a2 2 0 11-4 0 2 2 0 014 0zM19 17a2 2 0 11-4 0 2 2 0 014 0z"/>
            <path d="M13 16V6a1 1 0 00-1-1H4a1 1 0 00-1 1v10a1 1 0 001 1h1m8-1a1 1 0 01-1 1H9m4-1V8a1 1 0 011-1h2.586a1 1 0 01.707.293l3.414 3.414a1 1 0 01.293.707V16a1 1 0 01-1 1h-1m-6-1a1 1 0 001 1h1M5 17a2 2 0 104 0m-4 0a2 2 0 114 0m6 0a2 2 0 104 0m-4 0a2 2 0 114 0"/>
          </svg>
          设备列表
        </a>
        <a href="/logs" class="nav-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          业务日志
        </a>
      </div>
    </div>

    <div class="kpi-row">
      <a href="/devices" class="kpi-card">
        <div class="kpi-title">设备总数 / Total Devices</div>
        <div id="kpi-total" class="kpi-value">0</div>
      </a>
      <a href="/devices" class="kpi-card">
        <div class="kpi-title">在线设备 / Online Devices</div>
        <div id="kpi-online" class="kpi-value online">0</div>
      </a>
      <a href="/logs" class="kpi-card alarm">
        <div class="kpi-title">当前报警 / Current Alarms</div>
        <div id="kpi-alarm" class="kpi-value alarm">0</div>
      </a>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/>
          </svg>
          <span class="card-title">工厂平面图 / Factory Floor Map</span>
        </div>
        <div class="map-meta" id="map-meta">最近刷新: -</div>
      </div>
      <div id="map-chart"></div>
    </div>
  </div>

  <script id="auth-token-data" type="application/json">
    {{ app_auth_token|tojson }}
  </script>
  <script>
    // 全局鉴权令牌 / Global auth token
    const APP_AUTH_TOKEN = JSON.parse(document.getElementById('auth-token-data').textContent);
    const AUTH_TOKEN = APP_AUTH_TOKEN || '';

    // 请求头鉴权助手 / Auth header helper
    function authHeaders() {
      const headers = {};
      if (AUTH_TOKEN) {
        headers['Authorization'] = `Bearer ${AUTH_TOKEN}`;
        headers['X-Auth-Token'] = AUTH_TOKEN;
      }
      return headers;
    }

    // 状态颜色映射 / Status color mapping
    const COLORS = {
      normal: '#34c759',
      alarm: '#ff3b30',
      offline: '#8e8e93'
    };

    const chart = echarts.init(document.getElementById('map-chart'));

    // ====================== 新增：热力图配置 ======================
    const mapOption = {
      backgroundColor: '#ffffff',
      tooltip: {
        trigger: 'item',
        backgroundColor: '#ffffff',
        borderColor: '#d2d2d7',
        borderWidth: 1,
        textStyle: { color: '#1d1d1f', fontSize: 13 },
        formatter: function(params) {
          if (params.seriesType === 'heatmap') {
            return `报警热力值：${params.data[2]}`;
          }
          return `<strong>${params.data.name}</strong><br/>状态: ${params.data.statusText}<br/>最后更新: ${params.data.lastSeen}`;
        }
      },
      xAxis: { min: 0, max: 1920, show: false },
      yAxis: { min: 0, max: 1080, inverse: true, show: false },
      graphic: [{
        type: 'image',
        id: 'background',
        left: 0,
        top: 0,
        style: {
          image: '/Dashboard.png',
          width: 1920,
          height: 1080,
          opacity: 0.3
        }
      }],
      series: [
        // 1. 设备点位（原有）
        {
          type: 'scatter',
          symbolSize: 36,
          data: [],
          z: 10
        },
        // 2. 报警热力图（新增）
        {
          type: 'heatmap',
          data: [],
          blurSize: 50,       // 热力扩散大小
          minOpacity: 0.1,    // 最小透明度
          maxOpacity: 0.8,    // 最大透明度
          z: 5,               // 层级在点位下方
          // 热力图颜色梯度：绿→黄→红
          color: [
            '#00ff00',
            '#ffff00',
            '#ff0000'
          ]
        }
      ]
    };
    chart.setOption(mapOption);

    // 更新地图点位 + 热力图 / Update map points + heatmap
    function updateMap(devices) {
      const pointData = [];  // 散点数据
      const heatData = [];   // 热力数据

      (devices || []).forEach(dev => {
        let color = COLORS.offline;
        let statusText = '离线';
        let heatValue = 0;   // 热力值：0=无，1=在线，2=报警

        if (dev.online_status === 1) {
          heatValue = 1;
          if (dev.alarm_status === 1) {
            color = COLORS.alarm;
            statusText = '报警';
            heatValue = 5;   // 报警赋予更高热力值
          } else {
            color = COLORS.normal;
            statusText = '正常';
          }
        }

        // 散点
        pointData.push({
          name: dev.device_id,
          value: [dev.pos_x || 0, dev.pos_y || 0],
          itemStyle: { color, borderColor: color, borderWidth: 2 },
          statusText,
          lastSeen: dev.last_seen || '-'
        });

        // 热力点：[x, y, value]
        heatData.push([
          dev.pos_x || 0,
          dev.pos_y || 0,
          heatValue
        ]);
      });

      // 同时更新散点 + 热力图
      chart.setOption({
        series: [
          { data: pointData },
          { data: heatData }
        ]
      });

      document.getElementById('map-meta').textContent = `最近刷新: ${new Date().toLocaleTimeString('zh-CN', { hour12: false })}`;
    }

    // 更新KPI统计 / Update KPI counters
    function updateKpis(devices) {
      const list = devices || [];
      const total = list.length;
      const online = list.filter(d => d.online_status === 1).length;
      const alarm = list.filter(d => d.online_status === 1 && d.alarm_status === 1).length;

      document.getElementById('kpi-total').textContent = total;
      document.getElementById('kpi-online').textContent = online;
      document.getElementById('kpi-alarm').textContent = alarm;
    }

    const socket = io({
      auth: { token: AUTH_TOKEN }
    });

    // 位置广播：用于地图与KPI更新 / Position stream updates map and KPIs
    socket.on('position_update', (devices) => {
      updateMap(devices);
      updateKpis(devices);
    });

    // 首次加载：拉取当前设备快照 / Initial snapshot fetch
    async function init() {
      try {
        const res = await fetch('/api/devices', { headers: authHeaders() });
        const data = await res.json();
        const devices = data.devices || [];
        updateMap(devices);
        updateKpis(devices);
      } catch (e) {
        console.error('初始化失败 / Init failed:', e);
      }
    }

    window.addEventListener('resize', () => {
      chart.resize();
    });

    init();
  </script>
</body>
</html>
